<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Student</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f6fb; font-family: 'Segoe UI', sans-serif; }
        .form-card { max-width: 520px; margin: 60px auto; background: #fff; border-radius: 16px; padding: 36px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
        h4 { font-weight: 700; margin-bottom: 24px; }
        .form-control { border-radius: 10px; }
        .btn { border-radius: 10px; padding: 10px 24px; }
    </style>
</head>
<body>

<div class="form-card">
    <h4>Edit Student</h4>

    <!-- FIX: Posts to /admin/students/update (AdminController @PostMapping) -->
    <form th:action="@{/admin/students/update}" method="post">
        <input type="hidden" name="id" th:value="${student.id}" />

        <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" name="name" class="form-control" th:value="${student.name}" required />
        </div>
        <div class="mb-3">
            <label class="form-label">Email Address</label>
            <input type="email" name="email" class="form-control" th:value="${student.email}" required />
        </div>
        <div class="mb-3">
            <label class="form-label">Department</label>
            <input type="text" name="department" class="form-control" th:value="${student.department}" required />
        </div>
        <div class="mb-4">
            <label class="form-label">New Password <small class="text-muted">(leave blank to keep current)</small></label>
            <input type="password" name="password" class="form-control" placeholder="Enter new password (optional)" />
        </div>
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-success">Update Student</button>
            <a href="/admin/dashboard" class="btn btn-outline-secondary">Cancel</a>
        </div>
    </form>
</div>

</body>
</html>
