<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Attendance Records</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f6fb; font-family: 'Segoe UI', sans-serif; }
        .card { border: none; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
        .table thead th {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #6c757d;
            border: none;
            background: #f8f9ff;
        }
        .table td { vertical-align: middle; }
        .badge-present  { background: #d1fae5; color: #065f46; border-radius: 6px; padding: 3px 10px; font-size: 0.78rem; font-weight: 600; }
        .badge-absent   { background: #fee2e2; color: #991b1b; border-radius: 6px; padding: 3px 10px; font-size: 0.78rem; font-weight: 600; }
        .badge-pending  { background: #fef3c7; color: #92400e; border-radius: 6px; padding: 3px 10px; font-size: 0.78rem; font-weight: 600; }
        .badge-approved { background: #d1fae5; color: #065f46; border-radius: 6px; padding: 3px 10px; font-size: 0.78rem; font-weight: 600; }
        .badge-rejected { background: #fee2e2; color: #991b1b; border-radius: 6px; padding: 3px 10px; font-size: 0.78rem; font-weight: 600; }
    </style>
</head>
<body>

<div class="container mt-5">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="fw-bold mb-0">Attendance Records</h4>
            <p class="text-muted mb-0">Full attendance history</p>
        </div>
        <a href="/admin/dashboard" class="btn btn-outline-secondary">← Back</a>
    </div>

    <!-- Success / Error Alerts -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Filter Form -->
    <div class="card mb-4">
        <div class="card-body">
            <form action="/attendance/filter" method="get" class="row g-2 align-items-end">
                <div class="col-auto">
                    <label class="form-label fw-semibold">Day</label>
                    <input type="number" name="day" class="form-control"
                           min="1" max="31" placeholder="e.g. 5"
                           th:value="${param.day}">
                </div>
                <div class="col-auto">
                    <label class="form-label fw-semibold">Month</label>
                    <input type="number" name="month" class="form-control"
                           min="1" max="12" placeholder="e.g. 5"
                           th:value="${param.month}">
                </div>
                <div class="col-auto">
                    <label class="form-label fw-semibold">Year</label>
                    <input type="number" name="year" class="form-control"
                           placeholder="e.g. 2026"
                           th:value="${param.year}">
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn-primary">Filter</button>
                </div>
                <div class="col-auto">
                    <a href="/view-attendance" class="btn btn-outline-secondary">Clear</a>
                </div>
            </form>
        </div>
    </div>

    <!-- Export Button -->
    <div class="mb-3 text-end">
        <a th:href="@{/attendance/export(
                day=${param.day},
                month=${param.month},
                year=${param.year})}"
           class="btn btn-success">
            ⬇ Export to Excel
        </a>
    </div>

    <!-- Record Count -->
    <div class="mb-2 text-muted" th:if="${attendanceList != null}">
        Showing <strong th:text="${#lists.size(attendanceList)}"></strong> record(s)
    </div>

    <!-- Attendance Table -->
    <div class="card">
        <div class="card-body">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Student Name</th>
                        <th>Date</th>
                        <th>Check In</th>
                        <th>Check Out</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="a : ${attendanceList}">

                        <!-- ID -->
                        <td th:text="${a.id}"></td>

                        <!-- Student Name -->
                        <td th:text="${a.student != null ? a.student.name : 'Unknown'}"></td>

                        <!-- Date -->
                        <td th:text="${a.date}"></td>

         <!-- Check In -->
<td th:text="${a.checkIn != null ? #temporals.format(a.checkIn, 'HH:mm:ss') : '-'}"></td>

<!-- Check Out -->
<td th:text="${a.checkOut != null ? #temporals.format(a.checkOut, 'HH:mm:ss') : '-'}"></td>

                        <!-- Status Badge -->
                        <td>
                            <span th:class="${'badge-' + #strings.toLowerCase(a.status)}"
                                  th:text="${a.status}"></span>
                        </td>

                        <!-- ✅ Check Out Button -->
                        <td>
                            <form th:action="@{/attendance/checkout/{id}(id=${a.id})}"
                                  method="post">
                                <button type="submit"
                                        class="btn btn-sm"
                                        th:classappend="${a.checkOut != null} ? 'btn-secondary' : 'btn-outline-primary'"
                                        th:disabled="${a.checkOut != null}"
                                        th:text="${a.checkOut != null ? '✔ Checked Out' : 'Check Out'}">
                                </button>
                            </form>
                        </td>

                    </tr>

                    <!-- No records row -->
                    <tr th:if="${#lists.isEmpty(attendanceList)}">
                        <td colspan="7" class="text-center text-muted py-4">
                            No attendance records found.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
