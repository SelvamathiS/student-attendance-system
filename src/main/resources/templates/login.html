<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login – Student Attendance System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        .login-card h2 {
            color: #fff;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .login-card p.subtitle {
            color: rgba(255,255,255,0.5);
            font-size: 0.9rem;
            margin-bottom: 28px;
        }
        .form-control {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: #fff;
            border-radius: 10px;
            padding: 12px 16px;
        }
        .form-control:focus {
            background: rgba(255,255,255,0.12);
            border-color: #4e9af1;
            box-shadow: 0 0 0 3px rgba(78,154,241,0.2);
            color: #fff;
        }
        .form-control::placeholder { color: rgba(255,255,255,0.35); }
        .form-label { color: rgba(255,255,255,0.7); font-size: 0.85rem; margin-bottom: 6px; }
        .btn-login {
            background: linear-gradient(135deg, #4e9af1, #3b7dd8);
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            font-size: 1rem;
            letter-spacing: 0.5px;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(78,154,241,0.4);
        }
        .alert-danger {
            background: rgba(220,53,69,0.15);
            border: 1px solid rgba(220,53,69,0.3);
            color: #ff8a8a;
            border-radius: 10px;
        }
        .alert-success {
            background: rgba(25,135,84,0.15);
            border: 1px solid rgba(25,135,84,0.3);
            color: #75e6a4;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Welcome Back</h2>
    <p class="subtitle">Student Attendance System</p>

    <div th:if="${param.error}" class="alert alert-danger mb-3" role="alert">
        Invalid email or password. Please try again.
    </div>
    <div th:if="${param.logout}" class="alert alert-success mb-3" role="alert">
        You have been logged out successfully.
    </div>

    <form th:action="@{/login}" method="post">
        <div class="mb-3">
            <label class="form-label">Email Address</label>
            <!-- CHANGED: name="username" → name="email" -->
            <input type="email" name="email" class="form-control" placeholder="Enter your email" required autofocus />
        </div>
        <div class="mb-4">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" placeholder="Enter your password" required />
        </div>
        <button type="submit" class="btn btn-login btn-primary w-100">Sign In</button>
    </form>
</div>

</body>
</html>
