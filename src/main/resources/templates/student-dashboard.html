<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Student Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f6fb; font-family: 'Segoe UI', sans-serif; }
        .navbar { background: #0f3460; }
        .navbar-brand, .nav-link { color: #fff !important; }
        .stat-card { border-radius: 14px; padding: 20px 24px; color: #fff; text-align: center; }
        .stat-card h5 { font-size: 0.85rem; opacity: 0.8; text-transform: uppercase; letter-spacing: 1px; }
        .stat-card h2 { font-size: 2.2rem; font-weight: 700; margin: 0; }
        .welcome-card { background: linear-gradient(135deg, #0f3460, #16213e); color: #fff; border-radius: 16px; padding: 28px 32px; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg px-4">
    <span class="navbar-brand fw-bold">🎓 AttendanceSystem</span>
    <div class="ms-auto">
        <a href="/logout" class="btn btn-outline-light btn-sm">Logout</a>
    </div>
</nav>

<div class="container mt-4">

    <!-- Welcome Card -->
    <div class="welcome-card mb-4">
        <h4 class="fw-bold mb-1">Welcome, <span th:text="${student.name}">Student</span>!</h4>
        <p class="mb-0" style="opacity:0.7" th:text="${student.department}">Department</p>
    </div>

    <!-- FIX: Shows this student's OWN attendance counts (not global) -->
    <div class="row g-3 mb-4">
        <div class="col-md-6">
            <div class="stat-card" style="background: linear-gradient(135deg,#059669,#10b981)">
                <h5>My Present Days</h5>
                <h2 th:text="${presentCount}">0</h2>
            </div>
        </div>
        <div class="col-md-6">
            <div class="stat-card" style="background: linear-gradient(135deg,#dc2626,#ef4444)">
                <h5>My Absent Days</h5>
                <h2 th:text="${absentCount}">0</h2>
            </div>
        </div>
    </div>

    <!-- Action -->
    <div class="card border-0 rounded-4 shadow-sm p-4 text-center">
        <h5 class="fw-semibold mb-2">Mark Today's Attendance</h5>
        <p class="text-muted mb-3">Submit your attendance request for teacher approval.</p>
        <form th:action="@{/student/save-attendance}" method="post">
            <input type="hidden" name="studentId" th:value="${student.id}" />
            <button type="submit" class="btn btn-primary px-4">Submit Attendance Request</button>
        </form>
    </div>

</div>
</body>
</html>
