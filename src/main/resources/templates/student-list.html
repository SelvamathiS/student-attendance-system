<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Student List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f6fb; font-family: 'Segoe UI', sans-serif; }
        .card { border: none; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
        .table thead th { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px; color: #6c757d; border: none; background: #f8f9ff; }
        .table td { vertical-align: middle; }
    </style>
</head>
<body>

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="fw-bold mb-0">Student List</h4>
            <p class="text-muted">Manage all registered students</p>
        </div>
        <div class="d-flex gap-2">
            <a href="/admin/students/add" class="btn btn-primary">+ Add Student</a>
            <a href="/admin/dashboard" class="btn btn-outline-secondary">← Dashboard</a>
        </div>
    </div>

    <!-- FIX: Was a placeholder <h1> — now displays actual student data -->
    <div class="card">
        <div class="card-body">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Department</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="s : ${students}">
                        <td th:text="${s.id}"></td>
                        <td th:text="${s.name}"></td>
                        <td th:text="${s.email}"></td>
                        <td th:text="${s.department}"></td>
                        <td>
                            <a th:href="@{'/admin/students/edit/' + ${s.id}}"
                               class="btn btn-warning btn-sm me-1">Edit</a>
                            <a th:href="@{'/admin/students/delete/' + ${s.id}}"
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('Delete this student?')">Delete</a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(students)}">
                        <td colspan="5" class="text-center text-muted py-4">No students registered yet.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
