<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Teacher Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f6fb; font-family: 'Segoe UI', sans-serif; }
        .navbar { background: #1a1a2e; }
        .navbar-brand, .nav-link { color: #fff !important; }
        .card { border: none; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
        .table thead th { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px; color: #6c757d; border: none; background: #f8f9ff; }
        .table td { vertical-align: middle; }
        .badge-pending { background: #fef3c7; color: #92400e; border-radius: 6px; padding: 3px 10px; font-size: 0.78rem; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg px-4">
    <span class="navbar-brand fw-bold">🎓 AttendanceSystem</span>
    <div class="ms-auto">
        <a href="/logout" class="btn btn-outline-light btn-sm">Logout</a>
    </div>
</nav>

<div class="container mt-4">
    <h4 class="fw-bold mb-1">Teacher Dashboard</h4>
    <p class="text-muted mb-4">Review and approve pending attendance requests</p>

    <div class="card">
        <div class="card-body">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>Request ID</th>
                        <th>Student Name</th>
                        <th>Date</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="att : ${attendanceList}">
                        <td th:text="${att.id}"></td>
                        <td th:text="${att.student.name}"></td>
                        <td th:text="${att.date}"></td>
                        <td><span class="badge-pending" th:text="${att.status}"></span></td>
                        <td>
                            <form th:action="@{/teacher/update-status}" method="post" class="d-inline">
    <input type="hidden" name="attendanceId" th:value="${att.id}" />
    <!-- ✅ FIX: Use PRESENT/ABSENT instead of APPROVED/REJECTED -->
    <button type="submit" name="status" value="PRESENT"
            class="btn btn-success btn-sm me-1">✓ Approve</button>
    <button type="submit" name="status" value="ABSENT"
            class="btn btn-danger btn-sm">✗ Reject</button>
</form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(attendanceList)}">
                        <td colspan="5" class="text-center text-muted py-4">No pending requests.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
